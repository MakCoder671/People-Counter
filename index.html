<!DOCTYPE html>
<html>
<head>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gradient-to-b from-amber-700 to-amber-500 min-h-screen flex items-center justify-center">
    <div class="bg-black/40 backdrop-blur-md p-10 rounded-2xl shadow-2xl border-4 border-yellow-300 text-center">

        <!--Title-->
        <h1 class="text-4xl font-extrabold text-white mb-6 tacking-wide">
            People Entered:
        </h1>
        
        <!--Counter-->
        <h2 id="count-el" class="text-7xl font-extrabold text-yellow-300 drop-shadow-lg mb-8">
            0
        </h2>
        
        <!--Button Boxes-->
        <div class ="bg-black/30 p-6 rounded-xl border-2 border-yellow-400 shadow-inner">

            <div class="flex justify-center gap-4 mb-4">
                <button id="increment-btn" 
                    class="px-6 py-3 bg-green-600 hover:bg-green-700 text-white font-bold rounded-lg shadow-lg active:scale-95 transition"
                    onclick="increment()">
                    Increment
                </button>

            <button id="decrease-btn" 
                class="px-6 py-3 bg-red-600 hover:bg-red-700 text-white font-bold rounded-lg shadow-lg active:scale-95 transition"
                onclick="decrease()">
                Decrement
            </button>
        </div>

         <button id="clear-count"
            class="w-full px-6 py-3 bg-gray-700 hover:bg-gray-800 text-white font-bold rounded-lg shadow-lg active:scale-95 transition"
            onclick="clearCount()">
            Clear
        </button>
        
        </div>
    </div>
        
    <script src="index.js"></script>
</body>
</html>
